pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      run: gofumpt -l -w .
      stage_fixed: true
    lint:
      glob: "*.go"
      run: ./scripts/with-go-cache.sh golangci-lint run
    vet:
      glob: "*.go"
      run: ./scripts/with-go-cache.sh go vet ./...
    filesize:
      run: scripts/check-filesize.sh
    maxlines:
      run: scripts/check-max-lines.sh 500
    secrets:
      run: scripts/check-secrets.sh

pre-push:
  commands:
    coverage:
      run: scripts/check-coverage.sh 95
