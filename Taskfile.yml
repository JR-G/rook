version: "3"

tasks:
  build:
    desc: Build the rook binary
    cmds:
      - ./scripts/with-go-cache.sh go build -o bin/rook ./cmd/rook
    sources:
      - ./**/*.go

  run:
    desc: Build and run rook with the local config
    deps: [build]
    cmds:
      - ./scripts/run-rook.sh config/rook.toml

  slack-keychain-store:
    desc: Store the Slack bot and app tokens in macOS Keychain
    cmds:
      - ./scripts/store-slack-tokens.sh

  launchd-install:
    desc: Install the launchd agent for rook
    deps: [build]
    cmds:
      - ./scripts/install-launchd.sh

  test:
    desc: Run all tests
    cmds:
      - ./scripts/with-go-cache.sh go test -race -cover ./...

  cover:
    desc: Run tests with coverage report
    cmds:
      - ./scripts/with-go-cache.sh go test -race -coverprofile=coverage.out ./...
      - ./scripts/with-go-cache.sh go tool cover -func=coverage.out
      - ./scripts/with-go-cache.sh go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run linter
    cmds:
      - ./scripts/with-go-cache.sh golangci-lint run ./...

  check-lines:
    desc: Enforce the 500-line source file cap
    cmds:
      - ./scripts/check-max-lines.sh 500

  fmt:
    desc: Format all Go files
    cmds:
      - gofumpt -l -w .

  hooks:
    desc: Install git hooks
    cmds:
      - lefthook install

  clean:
    desc: Remove build artefacts
    cmds:
      - rm -rf bin/ coverage.out coverage.html

  setup:
    desc: Install development tools and hooks
    cmds:
      - go install mvdan.cc/gofumpt@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go install github.com/evilmartians/lefthook@latest
      - ./scripts/install.sh
